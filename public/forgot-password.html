<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Reset Password - Enrich U</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="logo"><i class="fas fa-gem"></i> Enrich <span>U</span></a>
      <h2>Reset Password</h2>
      <p class="subtitle">Enter your details to receive a reset code</p>
      <div id="alertBox" class="alert" style="display:none;"></div>

      <div id="step1">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" placeholder="Your username" required>
        </div>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="Your registered email" required>
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="sendResetCode()" id="sendBtn"><i class="fas fa-paper-plane"></i> Send Reset Code</button>
      </div>

      <div id="step2" style="display:none;">
        <div class="form-group">
          <label for="resetCode"><i class="fas fa-key"></i> Reset Code</label>
          <input type="text" id="resetCode" placeholder="6-digit code from your email" maxlength="6">
        </div>
        <div class="form-group">
          <label for="newPassword"><i class="fas fa-lock"></i> New Password</label>
          <input type="password" id="newPassword" placeholder="Min 8 characters" minlength="8">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="resetPassword()" id="resetBtn"><i class="fas fa-check-circle"></i> Reset Password</button>
        <p style="text-align:center;margin-top:16px;"><a href="#" onclick="showStep1()" style="color:var(--primary);">Back to Login</a></p>
      </div>

      <p class="auth-link">Remember your password? <a href="/login.html">Login here</a></p>
    </div>
  </div>

  <script>
    function showAlert(message, type) {
      const box = document.getElementById('alertBox');
      box.className = 'alert alert-' + type;
      box.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i> ' + message;
      box.style.display = 'flex';
    }

    async function sendResetCode() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!username || !email) return showAlert('Fill all fields', 'error');
      const btn = document.getElementById('sendBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sending...';
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert(data.message, 'success');
          if (data.code) showAlert('Your code: ' + data.code, 'success');
          document.getElementById('step1').style.display = 'none';
          document.getElementById('step2').style.display = 'block';
        } else showAlert(data.error, 'error');
      } catch (err) { showAlert('Network error', 'error'); }
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Code';
    }

    async function resetPassword() {
      const username = document.getElementById('username').value.trim();
      const code = document.getElementById('resetCode').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      if (!code || !newPassword) return showAlert('Fill all fields', 'error');
      if (newPassword.length < 8) return showAlert('Min 8 characters', 'error');
      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Resetting...';
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, code, newPassword })
        });
        const data = await res.json();
        if (res.ok) { showAlert(data.message, 'success'); setTimeout(() => window.location.href = '/login.html', 2000); }
        else showAlert(data.error, 'error');
      } catch (err) { showAlert('Network error', 'error'); }
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Reset Password';
    }

    function showStep1() { window.location.href = '/login.html'; }
  </script>
</body>
</html>
