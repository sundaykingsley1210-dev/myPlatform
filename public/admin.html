<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Admin Panel - Enrich U</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo"><i class="fas fa-gem"></i> Enrich <span>U</span></a>
      <div class="nav-actions">
        <a href="/dashboard.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <a href="#" class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <h1><i class="fas fa-shield-halved" style="color:var(--primary);"></i> Admin Panel</h1>
        <p>Manage users, withdrawals, and platform settings</p>
      </div>

      <div class="dash-stats">
        <div class="dash-stat-card"><div class="label">Total Users</div><div class="value primary" id="totalUsers">0</div></div>
        <div class="dash-stat-card"><div class="label">Total Invested</div><div class="value accent" id="totalInvested">₦0</div></div>
        <div class="dash-stat-card"><div class="label">Pending Withdrawals</div><div class="value gold" id="pendingWithdrawals">0</div></div>
      </div>

      <div class="dash-tabs">
        <button class="dash-tab active" onclick="switchTab('withdrawals',this)"><i class="fas fa-money-bill-wave"></i> Withdrawals</button>
        <button class="dash-tab" onclick="switchTab('transactions',this)"><i class="fas fa-exchange-alt"></i> Transactions</button>
        <button class="dash-tab" onclick="switchTab('investments',this)"><i class="fas fa-chart-line"></i> Investments</button>
        <button class="dash-tab" onclick="switchTab('support',this)"><i class="fas fa-headset"></i> Support</button>
        <button class="dash-tab" onclick="switchTab('data',this)"><i class="fas fa-database"></i> Data</button>
        <button class="dash-tab" onclick="switchTab('users',this)"><i class="fas fa-users"></i> Users</button>
      </div>

      <div class="dash-panel active" id="panel-withdrawals"><div id="withdrawalsList"></div></div>
      <div class="dash-panel" id="panel-transactions"><div id="transactionsList"></div></div>
      <div class="dash-panel" id="panel-investments"><div id="investmentsList"></div></div>
      <div class="dash-panel" id="panel-support"><div id="supportList"></div></div>
      <div class="dash-panel" id="panel-data"><div id="dataManage"></div></div>
      <div class="dash-panel" id="panel-users"><div id="usersList"></div></div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    const API = (url, opts = {}) => {
      const token = localStorage.getItem('token');
      const headers = { ...(opts.headers || {}), 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, { ...opts, headers }).then(async r => {
        if (r.status === 401 || r.status === 403) { window.location.href = '/login.html'; return r; }
        return r;
      });
    };

    function switchTab(tab, el) {
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'users') loadUsers();
      if (tab === 'withdrawals') loadWithdrawals();
      if (tab === 'transactions') loadTransactions();
      if (tab === 'investments') loadAdminInvestments();
      if (tab === 'support') loadAdminSupport();
      if (tab === 'data') loadDataManage();
    }

    async function loadStats() {
      try {
        const res = await API('/api/admin/stats');
        const data = await res.json();
        const s = data.stats;
        document.getElementById('totalUsers').textContent = s.totalUsers;
        document.getElementById('totalInvested').textContent = '₦' + s.totalInvestedAmount.toLocaleString();
        document.getElementById('pendingWithdrawals').textContent = s.pendingWithdrawals;
      } catch (err) {}
    }

    async function loadWithdrawals() {
      try {
        const res = await API('/api/admin/withdrawals');
        const data = await res.json();
        const list = document.getElementById('withdrawalsList');
        if (!data.withdrawals || !data.withdrawals.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-money-bill-wave"></i><h3>No Withdrawals</h3></div>'; return; }
        let html = '';
        data.withdrawals.forEach(w => {
          const c = w.status === 'completed' ? '#22c55e' : w.status === 'pending' ? '#f59e0b' : '#ef4444';
          const vat = w.vat_amount || Math.round(Number(w.amount) * 0.10);
          const credit = w.credit_amount || (Number(w.amount) - vat);
          html += `<div class="investment-card">
            <div class="investment-header">
              <div class="investment-vip"><span style="font-size:1.1rem;font-weight:700;color:var(--primary);">₦${Number(w.amount).toLocaleString()}</span>
              <span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${w.status}</span></div>
              <span style="font-size:0.8rem;color:var(--text-muted);">User ID: ${w.user_id}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Bank</div><div class="val">${w.bank_name}</div></div>
              <div class="invest-detail"><div class="label">Account</div><div class="val">${w.account_number}</div></div>
              <div class="invest-detail"><div class="label">Name</div><div class="val">${w.account_name}</div></div>
              <div class="invest-detail"><div class="label">VAT (10%)</div><div class="val" style="color:#ef4444;">₦${vat.toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Credit</div><div class="val" style="color:#22c55e;font-weight:700;">₦${credit.toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Date</div><div class="val">${new Date(w.created_at).toLocaleDateString()}</div></div>
            </div>
            ${w.admin_note ? '<div style="padding:8px 12px;background:rgba(255,215,0,0.05);border-radius:6px;font-size:0.8rem;color:var(--gold);margin-top:12px;"><i class="fas fa-comment"></i> ' + w.admin_note + '</div>' : ''}
            ${w.status === 'pending' ? `<div class="claim-btn-container" style="display:flex;gap:8px;justify-content:center;margin-top:16px;">
              <button class="btn btn-accent" onclick="approveWithdrawal(${w.id})"><i class="fas fa-check"></i> Approve</button>
              <button class="btn btn-danger" onclick="rejectWithdrawal(${w.id})"><i class="fas fa-times"></i> Reject</button>
            </div>` : ''}
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function approveWithdrawal(id) {
      const note = prompt('Admin note (optional):') || 'Approved';
      try {
        const res = await API('/api/admin/withdrawal/' + id + '/approve', { method: 'POST', body: JSON.stringify({ note }) });
        const data = await res.json();
        if (res.ok) { showToast('Withdrawal approved', 'success'); loadWithdrawals(); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function rejectWithdrawal(id) {
      const note = prompt('Rejection reason:');
      if (!note) return;
      try {
        const res = await API('/api/admin/withdrawal/' + id + '/reject', { method: 'POST', body: JSON.stringify({ note }) });
        const data = await res.json();
        if (res.ok) { showToast('Withdrawal rejected & refunded', 'success'); loadWithdrawals(); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function loadUsers() {
      try {
        const res = await API('/api/admin/users');
        const data = await res.json();
        const list = document.getElementById('usersList');
        if (!data.users || !data.users.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><h3>No Users</h3></div>'; return; }
        let html = '';
        data.users.forEach(u => {
          html += `<div class="investment-card">
            <div class="investment-header">
              <div class="investment-vip"><span style="font-weight:700;">${u.username}</span>
              ${u.is_admin ? '<span class="status-badge" style="background:rgba(0,87,255,0.1);color:var(--primary);border:1px solid rgba(0,87,255,0.2);">ADMIN</span>' : ''}</div>
              <span style="font-size:0.8rem;color:var(--text-muted);">ID: ${u.id}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Balance</div><div class="val primary">₦${Number(u.balance).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Earned</div><div class="val accent">₦${Number(u.total_earned).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Joined</div><div class="val">${new Date(u.created_at).toLocaleDateString()}</div></div>
              <div class="invest-detail"><div class="label">Email</div><div class="val">${u.email || 'N/A'}</div></div>
            </div>
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function loadTransactions() {
      try {
        const res = await API('/api/admin/transactions');
        const data = await res.json();
        const list = document.getElementById('transactionsList');
        if (!data.transactions || !data.transactions.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-exchange-alt"></i><h3>No Transactions</h3><p>All payment transactions will appear here</p></div>'; return; }
        let html = '<div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;">';
        html += '<input type="text" id="txSearch" placeholder="Search by reference or user..." oninput="filterTransactions()" style="flex:1;min-width:200px;padding:10px 14px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;">';
        html += '<select id="txStatusFilter" onchange="filterTransactions()" style="padding:10px 14px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;">';
        html += '<option value="">All Status</option><option value="pending">Pending</option><option value="completed">Completed</option></select>';
        html += '</div><div id="transactionsListInner"></div>';
        list.innerHTML = html;
        window._allTransactions = data.transactions;
        renderTransactions(data.transactions);
      } catch (err) { document.getElementById('transactionsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load transactions</h3></div>'; }
    }

    function renderTransactions(txs) {
      const inner = document.getElementById('transactionsListInner');
      if (!inner) return;
      if (!txs.length) { inner.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h3>No matching transactions</h3></div>'; return; }
      let html = '';
      txs.forEach(tx => {
        const c = tx.status === 'completed' ? '#22c55e' : tx.status === 'pending' ? '#f59e0b' : '#ef4444';
        const icon = tx.type === 'investment' ? 'fa-arrow-up' : tx.type === 'withdrawal' ? 'fa-arrow-down' : 'fa-exchange-alt';
        html += `<div class="investment-card" style="border-left:3px solid ${c};">
          <div class="investment-header">
            <div class="investment-vip">
              <span style="font-weight:700;color:${tx.type === 'investment' ? 'var(--accent)' : 'var(--primary)'};">₦${Number(tx.amount).toLocaleString()}</span>
              <span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${tx.status}</span>
              <span style="font-size:0.7rem;padding:3px 8px;background:rgba(255,255,255,0.05);border-radius:8px;color:var(--text-muted);"><i class="fas ${icon}"></i> ${tx.type}</span>
            </div>
            <span style="font-size:0.8rem;color:var(--text-muted);">User ID: ${tx.user_id}</span>
          </div>
          <div class="investment-details">
            <div class="invest-detail"><div class="label">Bank</div><div class="val">${tx.bank_name || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Account</div><div class="val">${tx.account_number || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Account Name</div><div class="val">${tx.account_name || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Reference</div><div class="val" style="font-size:0.7rem;word-break:break-all;">${tx.reference || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Date</div><div class="val">${new Date(tx.created_at).toLocaleString()}</div></div>
            <div class="invest-detail"><div class="label">VIP Level</div><div class="val">${tx.vip_level ? 'VIP ' + tx.vip_level : 'N/A'}</div></div>
            </div>
            ${!u.is_admin ? '<div style="margin-top:12px;text-align:center;"><button class="btn btn-danger btn-sm" onclick="deleteUser(' + u.id + ',\'' + u.username + '\')"><i class="fas fa-trash"></i> Delete User</button></div>' : ''}
          </div>`;
      });
      inner.innerHTML = html;
    }

    function filterTransactions() {
      const search = (document.getElementById('txSearch')?.value || '').toLowerCase();
      const status = document.getElementById('txStatusFilter')?.value || '';
      let filtered = window._allTransactions || [];
      if (search) filtered = filtered.filter(tx => (tx.reference || '').toLowerCase().includes(search) || String(tx.user_id).includes(search) || (tx.account_name || '').toLowerCase().includes(search));
      if (status) filtered = filtered.filter(tx => tx.status === status);
      renderTransactions(filtered);
    }

    async function loadAdminInvestments() {
      try {
        const res = await API('/api/admin/investments');
        const data = await res.json();
        const list = document.getElementById('investmentsList');
        if (!data.investments || !data.investments.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No Investments</h3></div>'; return; }
        let html = '';
        data.investments.forEach(inv => {
          const c = inv.status === 'active' ? '#22c55e' : '#ef4444';
          html += `<div class="investment-card" style="border-left:3px solid ${c};">
            <div class="investment-header">
              <div class="investment-vip">
                <span class="vip-badge">VIP ${inv.vip_level}</span>
                <span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${inv.status}</span>
              </div>
              <span style="font-size:0.8rem;color:var(--text-muted);">User ID: ${inv.user_id}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Amount</div><div class="val primary">₦${Number(inv.amount).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Daily Return</div><div class="val accent">₦${Number(inv.daily_return).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Total Collected</div><div class="val">₦${Number(inv.total_collected).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Days</div><div class="val">${inv.days_collected}</div></div>
              <div class="invest-detail"><div class="label">Since</div><div class="val">${new Date(inv.created_at).toLocaleDateString()}</div></div>
            </div>
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) { document.getElementById('investmentsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load</h3></div>'; }
    }

    async function loadAdminSupport() {
      try {
        const res = await API('/api/admin/messages');
        const data = await res.json();
        const list = document.getElementById('supportList');
        if (!data.messages || !data.messages.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-headset"></i><h3>No Messages</h3><p>User support messages will appear here</p></div>'; return; }
        const grouped = {};
        data.messages.forEach(m => {
          if (!grouped[m.user_id]) grouped[m.user_id] = [];
          grouped[m.user_id].push(m);
        });
        let html = '';
        for (const [userId, msgs] of Object.entries(grouped)) {
          const lastMsg = msgs[msgs.length - 1];
          html += `<div class="investment-card" style="margin-bottom:12px;">
            <div class="investment-header">
              <div class="investment-vip"><span style="font-weight:700;"><i class="fas fa-user"></i> User ID: ${userId}</span>
              <span style="font-size:0.75rem;color:var(--text-muted);">${msgs.length} messages</span></div>
              <span style="font-size:0.8rem;color:var(--text-muted);">${new Date(lastMsg.created_at).toLocaleString()}</span>
            </div>
            <div style="max-height:200px;overflow-y:auto;padding:12px;background:var(--bg-dark);border-radius:var(--radius-sm);margin:12px 0;">
              ${msgs.map(m => '<div style="margin-bottom:8px;text-align:' + (m.sender === 'user' ? 'left' : 'right') + ';"><div style="display:inline-block;padding:8px 12px;border-radius:10px;max-width:80%;background:' + (m.sender === 'user' ? 'rgba(255,255,255,0.05)' : 'var(--primary)') + ';color:' + (m.sender === 'user' ? 'var(--text-primary)' : 'white') + ';font-size:0.85rem;"><strong>' + (m.sender === 'user' ? 'User' : 'Admin') + ':</strong> ' + m.message + '</div><div style="font-size:0.6rem;color:var(--text-muted);margin-top:2px;">' + new Date(m.created_at).toLocaleString() + '</div></div>').join('')}
            </div>
            <div style="display:flex;gap:8px;">
              <input type="text" id="adminReply${userId}" placeholder="Type reply..." style="flex:1;padding:10px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;">
              <button class="btn btn-primary btn-sm" onclick="sendAdminReply(${userId})"><i class="fas fa-paper-plane"></i> Reply</button>
            </div>
          </div>`;
        }
        list.innerHTML = html;
      } catch (err) { document.getElementById('supportList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load</h3></div>'; }
    }

    function loadDataManage() {
      const area = document.getElementById('dataManage');
      area.innerHTML = `<div class="vip-detail-card">
        <h3 style="margin-bottom:16px;"><i class="fas fa-database" style="color:var(--primary);margin-right:8px;"></i> Data Management</h3>
        <p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.9rem;">Clear data from the platform. Be careful — this cannot be undone.</p>
        <div style="display:grid;gap:12px;">
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Transactions</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all payment transactions</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('transactions')"><i class="fas fa-trash"></i> Clear</button>
          </div>
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Withdrawals</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all withdrawal records</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('withdrawals')"><i class="fas fa-trash"></i> Clear</button>
          </div>
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Task Claims</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all daily task claims</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('task_claims')"><i class="fas fa-trash"></i> Clear</button>
          </div>
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Notifications</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all notifications</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('notifications')"><i class="fas fa-trash"></i> Clear</button>
          </div>
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Messages</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all support messages</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('messages')"><i class="fas fa-trash"></i> Clear</button>
          </div>
          <div style="padding:16px;background:var(--bg-dark);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <div><strong>Investments</strong><br><span style="font-size:0.8rem;color:var(--text-muted);">Clear all investment records</span></div>
            <button class="btn btn-danger btn-sm" onclick="clearData('investments')"><i class="fas fa-trash"></i> Clear</button>
          </div>
        </div>
      </div>`;
    }

    async function clearData(table) {
      if (!confirm('Are you sure you want to clear all ' + table + '? This cannot be undone.')) return;
      try {
        const res = await API('/api/admin/clear-all', { method: 'POST', body: JSON.stringify({ table }) });
        const data = await res.json();
        if (res.ok) { showToast(data.message, 'success'); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function deleteUser(id, username) {
      if (!confirm('Delete user "' + username + '" and ALL their data? This cannot be undone.')) return;
      try {
        const res = await API('/api/admin/delete-user/' + id, { method: 'POST' });
        const data = await res.json();
        if (res.ok) { showToast('User deleted', 'success'); loadUsers(); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function sendAdminReply(userId) {
      const input = document.getElementById('adminReply' + userId);
      const msg = input.value.trim();
      if (!msg) return;
      try {
        await API('/api/admin/messages', { method: 'POST', body: JSON.stringify({ userId, message: msg }) });
        input.value = '';
        showToast('Reply sent', 'success');
        loadAdminSupport();
      } catch (err) { showToast('Failed', 'error'); }
    }

    function showToast(message, type) {
      const t = document.createElement('div');
      t.className = 'toast ' + type; t.textContent = message;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login.html'; }

    async function init() {
      try {
        const res = await API('/api/me');
        const data = await res.json();
        if (!data.user.isAdmin) { window.location.href = '/dashboard.html'; return; }
        loadStats();
        loadWithdrawals();
      } catch (err) { window.location.href = '/login.html'; }
    }

    init();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
