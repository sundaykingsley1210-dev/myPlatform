<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Admin Panel - Enrich U</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo"><i class="fas fa-gem"></i> Enrich <span>U</span></a>
      <div class="nav-actions">
        <a href="/dashboard.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <a href="#" class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <h1><i class="fas fa-shield-halved" style="color:var(--primary);"></i> Admin Panel</h1>
        <p>Manage users, withdrawals, and platform settings</p>
      </div>

      <div class="dash-stats">
        <div class="dash-stat-card"><div class="label">Total Users</div><div class="value primary" id="totalUsers">0</div></div>
        <div class="dash-stat-card"><div class="label">Total Invested</div><div class="value accent" id="totalInvested">₦0</div></div>
        <div class="dash-stat-card"><div class="label">Pending Withdrawals</div><div class="value gold" id="pendingWithdrawals">0</div></div>
      </div>

      <div id="pendingApprovalsSection" style="margin-bottom:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <h3 style="margin:0;color:#f59e0b;"><i class="fas fa-clock"></i> Pending Payment Approvals <span id="pendingApprovalCount" style="background:#f59e0b;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.8rem;margin-left:8px;">0</span></h3>
          <button class="btn btn-outline btn-sm" onclick="switchTab('transactions',document.querySelector('[onclick*=transactions]'))"><i class="fas fa-eye"></i> View All Transactions</button>
        </div>
        <div id="pendingApprovalsList"></div>
      </div>

      <div class="dash-tabs">
        <button class="dash-tab active" onclick="switchTab('activity',this)"><i class="fas fa-clock-rotate-left"></i> Activity</button>
        <button class="dash-tab" onclick="switchTab('withdrawals',this)"><i class="fas fa-money-bill-wave"></i> Withdrawals <span id="pendingWdBadge" style="display:none;background:#ef4444;color:#fff;padding:2px 6px;border-radius:10px;font-size:0.7rem;margin-left:4px;"></span></button>
        <button class="dash-tab" onclick="switchTab('transactions',this)"><i class="fas fa-exchange-alt"></i> Transactions <span id="pendingTxBadge" style="display:none;background:#f59e0b;color:#fff;padding:2px 6px;border-radius:10px;font-size:0.7rem;margin-left:4px;"></span></button>
        <button class="dash-tab" onclick="switchTab('investments',this)"><i class="fas fa-chart-line"></i> Investments</button>
        <button class="dash-tab" onclick="switchTab('support',this)"><i class="fas fa-headset"></i> Support</button>
        <button class="dash-tab" onclick="switchTab('data',this)"><i class="fas fa-database"></i> Data</button>
        <button class="dash-tab" onclick="switchTab('users',this)"><i class="fas fa-users"></i> Users</button>
        <button class="dash-tab" onclick="switchTab('resets',this)"><i class="fas fa-key"></i> Resets</button>
        <button class="dash-tab" onclick="switchTab('settings',this)"><i class="fas fa-cog"></i> Settings</button>
      </div>

      <div class="dash-panel active" id="panel-activity"><div id="activityLog"></div></div>
      <div class="dash-panel" id="panel-withdrawals"><div id="withdrawalsList"></div></div>
      <div class="dash-panel" id="panel-transactions"><div id="transactionsList"></div></div>
      <div class="dash-panel" id="panel-investments"><div id="investmentsList"></div></div>
      <div class="dash-panel" id="panel-support"><div id="supportList"></div></div>
      <div class="dash-panel" id="panel-data"><div id="dataManage"></div></div>
      <div class="dash-panel" id="panel-users"><div id="usersList"></div></div>
      <div class="dash-panel" id="panel-resets"><div id="resetsList"></div></div>
      <div class="dash-panel" id="panel-settings"><div id="settingsArea"></div></div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    const API = (url, opts = {}) => {
      const token = localStorage.getItem('token');
      const headers = { ...(opts.headers || {}), 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, { ...opts, headers }).then(async r => {
        if (r.status === 401 || r.status === 403) { window.location.href = '/login.html'; return r; }
        return r;
      });
    };

    function switchTab(tab, el) {
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'users') loadUsers();
      if (tab === 'resets') loadResetRequests();
      if (tab === 'withdrawals') loadWithdrawals();
      if (tab === 'transactions') loadTransactions();
      if (tab === 'investments') loadAdminInvestments();
      if (tab === 'support') loadAdminSupport();
      if (tab === 'data') loadDataManage();
      if (tab === 'activity') loadActivityLog();
      if (tab === 'settings') loadSettings();
    }

    async function loadStats() {
      try {
        const res = await API('/api/admin/stats');
        const data = await res.json();
        const s = data.stats;
        document.getElementById('totalUsers').textContent = s.totalUsers;
        document.getElementById('totalInvested').textContent = '₦' + s.totalInvestedAmount.toLocaleString();
        document.getElementById('pendingWithdrawals').textContent = s.pendingWithdrawals;
        const badge = document.getElementById('pendingWdBadge');
        if (s.pendingWithdrawals > 0) { badge.style.display = 'inline-block'; badge.textContent = s.pendingWithdrawals; }
        else { badge.style.display = 'none'; }
        const txBadge = document.getElementById('pendingTxBadge');
        if (txBadge) {
          if (s.pendingPaymentCount > 0) { txBadge.style.display = 'inline-block'; txBadge.textContent = s.pendingPaymentCount; }
          else { txBadge.style.display = 'none'; }
        }
      } catch (err) {}
    }

    async function loadPendingApprovals() {
      try {
        const res = await API('/api/admin/transactions');
        const data = await res.json();
        const usersRes = await API('/api/admin/users');
        const usersData = await usersRes.json();
        const userMap = {};
        (usersData.users || []).forEach(u => { userMap[u.id] = u; });

        const pending = (data.transactions || []).filter(tx => tx.status === 'pending_approval');
        const list = document.getElementById('pendingApprovalsList');
        const count = document.getElementById('pendingApprovalCount');

        count.textContent = pending.length;

        if (pending.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);"><i class="fas fa-check-circle" style="font-size:2rem;color:#22c55e;margin-bottom:8px;display:block;"></i><p style="font-weight:600;color:#22c55e;">No pending approvals</p><p style="font-size:0.85rem;">All payment approvals have been processed.</p></div>';
          return;
        }

        let html = '';
        pending.forEach(tx => {
          const u = userMap[tx.user_id] || {};
          const displayName = u.nickname || u.username || 'User #' + tx.user_id;
          html += `<div class="investment-card" style="border-left:3px solid #f59e0b;margin-bottom:10px;">
            <div class="investment-header">
              <div class="investment-vip" style="display:flex;align-items:center;gap:10px;">
                ${u.avatar_url ? '<img src="' + u.avatar_url + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #f59e0b;">' : '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#f97316);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:0.8rem;">' + displayName.charAt(0).toUpperCase() + '</div>'}
                <div>
                  <div style="font-weight:700;color:#f59e0b;">₦${Number(tx.amount).toLocaleString()}</div>
                  <div style="font-size:0.8rem;color:var(--text-muted);">${displayName} &bull; VIP ${tx.vip_level || '?'}</div>
                </div>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-accent btn-sm" onclick="approvePayment(${tx.id})"><i class="fas fa-check"></i> Accept</button>
                <button class="btn btn-danger btn-sm" onclick="rejectPayment(${tx.id})"><i class="fas fa-times"></i> Reject</button>
              </div>
            </div>
            <div class="investment-details" style="margin-top:8px;">
              <div class="invest-detail"><div class="label">Bank</div><div class="val">${tx.bank_name || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Account</div><div class="val">${tx.account_number || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Reference</div><div class="val" style="font-size:0.7rem;word-break:break-all;">${tx.reference || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Date</div><div class="val">${new Date(tx.created_at).toLocaleString()}</div></div>
            </div>
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function loadWithdrawals() {
      try {
        const res = await API('/api/admin/withdrawals');
        const data = await res.json();
        const usersRes = await API('/api/admin/users');
        const usersData = await usersRes.json();
        const userMap = {};
        (usersData.users || []).forEach(u => { userMap[u.id] = u; });
        const list = document.getElementById('withdrawalsList');
        if (!data.withdrawals || !data.withdrawals.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-money-bill-wave"></i><h3>No Withdrawals</h3></div>'; return; }
        let html = '';
        data.withdrawals.forEach(w => {
          const c = w.status === 'completed' ? '#22c55e' : w.status === 'pending' ? '#f59e0b' : '#ef4444';
          const vat = w.vat_amount || Math.round(Number(w.amount) * 0.10);
          const credit = w.credit_amount || (Number(w.amount) - vat);
          const u = userMap[w.user_id] || {};
          const displayName = u.nickname || u.username || 'User #' + w.user_id;
          html += `<div class="investment-card">
            <div class="investment-header">
              <div class="investment-vip" style="display:flex;align-items:center;gap:10px;">
                ${u.avatar_url ? '<img src="' + u.avatar_url + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);">' : '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:0.75rem;">' + displayName.charAt(0).toUpperCase() + '</div>'}
                <span style="font-size:1.1rem;font-weight:700;color:var(--primary);">₦${Number(w.amount).toLocaleString()}</span>
                <span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${w.status}</span>
              </div>
              <span style="font-size:0.8rem;color:var(--text-muted);">${displayName}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Bank</div><div class="val">${w.bank_name}</div></div>
              <div class="invest-detail"><div class="label">Account</div><div class="val">${w.account_number}</div></div>
              <div class="invest-detail"><div class="label">Name</div><div class="val">${w.account_name}</div></div>
              <div class="invest-detail"><div class="label">VAT (10%)</div><div class="val" style="color:#ef4444;">₦${vat.toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Credit</div><div class="val" style="color:#22c55e;font-weight:700;">₦${credit.toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Date</div><div class="val">${new Date(w.created_at).toLocaleDateString()}</div></div>
            </div>
            ${w.admin_note ? '<div style="padding:8px 12px;background:rgba(255,215,0,0.05);border-radius:6px;font-size:0.8rem;color:var(--gold);margin-top:12px;"><i class="fas fa-comment"></i> ' + w.admin_note + '</div>' : ''}
            ${w.status === 'pending' ? `<div class="claim-btn-container" style="display:flex;gap:8px;justify-content:center;margin-top:16px;">
              <button class="btn btn-accent" onclick="approveWithdrawal(${w.id})"><i class="fas fa-check"></i> Approve</button>
              <button class="btn btn-danger" onclick="rejectWithdrawal(${w.id})"><i class="fas fa-times"></i> Reject</button>
            </div>` : ''}
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function approveWithdrawal(id) {
      const note = prompt('Admin note (optional):') || 'Approved';
      try {
        const res = await API('/api/admin/withdrawal/' + id + '/approve', { method: 'POST', body: JSON.stringify({ note }) });
        const data = await res.json();
        if (res.ok) { showToast('Withdrawal approved', 'success'); loadWithdrawals(); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function rejectWithdrawal(id) {
      const note = prompt('Rejection reason:');
      if (!note) return;
      try {
        const res = await API('/api/admin/withdrawal/' + id + '/reject', { method: 'POST', body: JSON.stringify({ note }) });
        const data = await res.json();
        if (res.ok) { showToast('Withdrawal rejected & refunded', 'success'); loadWithdrawals(); loadStats(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function loadUsers() {
      try {
        const res = await API('/api/admin/users');
        const data = await res.json();
        const list = document.getElementById('usersList');
        if (!data.users || !data.users.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><h3>No Users</h3></div>'; return; }
        let html = '';
        data.users.forEach(u => {
          const displayName = u.nickname || u.username;
          html += `<div class="investment-card">
            <div class="investment-header">
              <div class="investment-vip" style="display:flex;align-items:center;gap:10px;">
                ${u.avatar_url ? '<img src="' + u.avatar_url + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);">' : '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:0.85rem;">' + displayName.charAt(0).toUpperCase() + '</div>'}
                <div><span style="font-weight:700;">${displayName}</span>
                ${u.is_admin ? '<span class="status-badge" style="background:rgba(0,87,255,0.1);color:var(--primary);border:1px solid rgba(0,87,255,0.2);margin-left:6px;">ADMIN</span>' : ''}</div>
              </div>
              <span style="font-size:0.8rem;color:var(--text-muted);">ID: ${u.id} ${u.nickname ? '(@' + u.username + ')' : ''}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Balance</div><div class="val primary">₦${Number(u.balance).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">Earned</div><div class="val accent">₦${Number(u.total_earned).toLocaleString()}</div></div>
              <div class="invest-detail"><div class="label">VIP Level</div><div class="val gold">${u.vip_level ? 'VIP ' + u.vip_level : 'None'}</div></div>
              <div class="invest-detail"><div class="label">Joined</div><div class="val">${new Date(u.created_at).toLocaleDateString()}</div></div>
              <div class="invest-detail"><div class="label">Email</div><div class="val">${u.email || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Phone</div><div class="val">${u.phone || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Password</div><div class="val" style="font-size:0.75rem;">${u.plain_password || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Referral</div><div class="val" style="font-size:0.75rem;">${u.referral_code || 'N/A'}</div></div>
            </div>
            ${!u.is_admin ? `<div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-accent btn-sm" onclick="creditBalance(${u.id},'${displayName}')"><i class="fas fa-plus-circle"></i> Credit</button>
              <button class="btn btn-outline btn-sm" onclick="adminUpgradeVip(${u.id},'${displayName}')" style="border-color:#a855f7;color:#a855f7;"><i class="fas fa-crown"></i> VIP</button>
              <button class="btn btn-outline btn-sm" onclick="editUser(${u.id},'${displayName}','${u.email || ''}','${u.phone || ''}','${u.nickname || ''}')"><i class="fas fa-pen"></i> Edit</button>
              <button class="btn btn-outline btn-sm" onclick="resetUserPassword(${u.id},'${displayName}')" style="border-color:#f59e0b;color:#f59e0b;"><i class="fas fa-key"></i> Reset Password</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${displayName}')"><i class="fas fa-trash"></i> Delete</button>
            </div>` : `<div style="margin-top:12px;text-align:center;"><span style="color:var(--primary);font-size:0.82rem;"><i class="fas fa-shield-alt"></i> Protected — admin account cannot be edited or deleted</span></div>`}
          </div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function loadTransactions() {
      try {
        const res = await API('/api/admin/transactions');
        const data = await res.json();
        const list = document.getElementById('transactionsList');
        if (!data.transactions || !data.transactions.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-exchange-alt"></i><h3>No Transactions</h3><p>All payment transactions will appear here</p></div>'; return; }
        let html = '<div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;">';
        html += '<input type="text" id="txSearch" placeholder="Search by reference or user..." oninput="filterTransactions()" style="flex:1;min-width:200px;padding:10px 14px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;">';
        html += '<select id="txStatusFilter" onchange="filterTransactions()" style="padding:10px 14px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.85rem;">';
        html += '<option value="">All Status</option><option value="pending_approval">Needs Approval</option><option value="pending">Pending</option><option value="completed">Completed</option><option value="rejected">Rejected</option></select>';
        html += '</div><div id="transactionsListInner"></div>';
        list.innerHTML = html;
        window._allTransactions = data.transactions;
        const usersRes = await API('/api/admin/users');
        const usersData = await usersRes.json();
        window._userMap = {};
        (usersData.users || []).forEach(u => { window._userMap[u.id] = u; });
        renderTransactions(data.transactions);
      } catch (err) { document.getElementById('transactionsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load transactions</h3></div>'; }
    }

    function renderTransactions(txs) {
      const inner = document.getElementById('transactionsListInner');
      if (!inner) return;
      if (!txs.length) { inner.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h3>No matching transactions</h3></div>'; return; }
      let html = '';
      txs.forEach(tx => {
        const c = tx.status === 'completed' ? '#22c55e' : tx.status === 'pending_approval' ? '#f59e0b' : tx.status === 'pending' ? '#6b7280' : '#ef4444';
        const icon = tx.type === 'investment' ? 'fa-arrow-up' : tx.type === 'withdrawal' ? 'fa-arrow-down' : tx.type === 'referral_bonus' ? 'fa-user-friends' : tx.type === 'admin_credit' ? 'fa-plus-circle' : 'fa-exchange-alt';
        const u = (window._userMap || {})[tx.user_id] || {};
        const displayName = u.nickname || u.username || 'User #' + tx.user_id;
        const approveRejectBtns = tx.status === 'pending_approval' ? `
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-accent btn-sm" onclick="approvePayment(${tx.id})"><i class="fas fa-check"></i> Approve</button>
            <button class="btn btn-danger btn-sm" onclick="rejectPayment(${tx.id})"><i class="fas fa-times"></i> Reject</button>
          </div>` : '';
        html += `<div class="investment-card" style="border-left:3px solid ${c};">
          <div class="investment-header">
            <div class="investment-vip" style="display:flex;align-items:center;gap:10px;">
              ${u.avatar_url ? '<img src="' + u.avatar_url + '" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);">' : '<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:0.7rem;">' + displayName.charAt(0).toUpperCase() + '</div>'}
              <span style="font-weight:700;color:${tx.type === 'investment' ? 'var(--accent)' : tx.type === 'referral_bonus' ? '#a855f7' : 'var(--primary)'};">₦${Number(tx.amount).toLocaleString()}</span>
              <span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${tx.status === 'pending_approval' ? 'Needs Approval' : tx.status}</span>
              <span style="font-size:0.7rem;padding:3px 8px;background:rgba(255,255,255,0.05);border-radius:8px;color:var(--text-muted);"><i class="fas ${icon}"></i> ${tx.type}</span>
            </div>
            <span style="font-size:0.8rem;color:var(--text-muted);">${displayName}</span>
          </div>
          <div class="investment-details">
            <div class="invest-detail"><div class="label">Bank</div><div class="val">${tx.bank_name || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Account</div><div class="val">${tx.account_number || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Account Name</div><div class="val">${tx.account_name || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Reference</div><div class="val" style="font-size:0.7rem;word-break:break-all;">${tx.reference || 'N/A'}</div></div>
            <div class="invest-detail"><div class="label">Date</div><div class="val">${new Date(tx.created_at).toLocaleString()}</div></div>

    function filterTransactions() {
      const search = (document.getElementById('txSearch')?.value || '').toLowerCase();
      const status = document.getElementById('txStatusFilter')?.value || '';
      let filtered = window._allTransactions || [];
      if (search) filtered = filtered.filter(tx => (tx.reference || '').toLowerCase().includes(search) || String(tx.user_id).includes(search) || (tx.account_name || '').toLowerCase().includes(search));
      if (status) filtered = filtered.filter(tx => tx.status === status);
      renderTransactions(filtered);
    }

    async function changeAdminPassword() {
      const current = document.getElementById('adminCurrentPass').value;
      const newPass = document.getElementById('adminNewPass').value;
      const confirm = document.getElementById('adminConfirmPass').value;
      if (!current || !newPass || !confirm) return showToast('Fill all fields', 'error');
      if (newPass.length < 6) return showToast('Min 6 characters', 'error');
      if (newPass !== confirm) return showToast('Passwords do not match', 'error');
      const btn = document.getElementById('adminPassBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Updating...';
      try {
        const res = await API('/api/change-password', { method: 'POST', body: JSON.stringify({ currentPassword: current, newPassword: newPass }) });
        const data = await res.json();
        if (res.ok) { showToast('Password changed! Please login again.', 'success'); setTimeout(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login.html'; }, 2000); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Update Password';
    }

                <div><span style="font-weight:700;">${r.username}</span> <span style="font-size:0.8rem;color:var(--text-muted);">@${r.username}</span></div>
              </div>
              <span style="font-size:0.75rem;padding:4px 10px;border-radius:12px;background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44;text-transform:capitalize;">${r.status}</span>
            </div>
            <div class="investment-details">
              <div class="invest-detail"><div class="label">Email</div><div class="val">${r.email || 'N/A'}</div></div>
              <div class="invest-detail"><div class="label">Requested</div><div class="val">${new Date(r.created_at).toLocaleString()}</div></div>
            </div>
            ${r.status === 'pending' ? `<div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-accent btn-sm" onclick="approveReset(${r.id},'${r.username}')"><i class="fas fa-check"></i> Reset to 123456</button>
              <button class="btn btn-danger btn-sm" onclick="rejectReset(${r.id},'${r.username}')"><i class="fas fa-times"></i> Reject</button>
            </div>` : ''}
          </div>`;
        });
        html += '</div>';
        document.getElementById('resetsList').innerHTML = html;
      } catch (err) { document.getElementById('resetsList').innerHTML = '<div class="empty-state"><p>Failed to load requests</p></div>'; }
    }

    async function approveReset(id, username) {
      if (!confirm('Reset password for ' + username + ' to 123456?')) return;
      try {
        const res = await API('/api/admin/approve-reset/' + id, { method: 'POST' });
        const data = await res.json();
        if (res.ok) { showToast(data.message, 'success'); loadResetRequests(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    async function rejectReset(id, username) {
      if (!confirm('Reject reset request for ' + username + '?')) return;
      try {
        const res = await API('/api/admin/reject-reset/' + id, { method: 'POST' });
        const data = await res.json();
        if (res.ok) { showToast('Request rejected', 'success'); loadResetRequests(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Failed', 'error'); }
    }

    function filterResets(status) {
      document.querySelectorAll('#resetRequestsList .investment-card').forEach(card => {
        if (status === 'all' || card.dataset.status === status) card.style.display = '';
        else card.style.display = 'none';
      });
    }

    function showToast(message, type) {
      const t = document.createElement('div');
      t.className = 'toast ' + type; t.textContent = message;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login.html'; }

    async function init() {
      try {
        const res = await API('/api/me');
        const data = await res.json();
        if (!data.user.isAdmin) { window.location.href = '/dashboard.html'; return; }
        loadStats();
        loadPendingApprovals();
        loadActivityLog();
        setInterval(loadStats, 15000);
        setInterval(loadPendingApprovals, 15000);
        document.addEventListener('visibilitychange', function() { if (!document.hidden) { loadStats(); loadPendingApprovals(); } });
      } catch (err) { window.location.href = '/login.html'; }
    }

    init();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
