<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Dashboard - Enrich U</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo"><i class="fas fa-gem"></i> Enrich <span>U</span></a>
      <div class="nav-actions">
        <span id="userGreeting" style="color:var(--text-secondary);font-size:0.9rem;margin-right:8px;"></span>
        <a href="/admin.html" class="btn btn-outline" id="adminLink" style="display:none;"><i class="fas fa-shield-halved"></i> Admin</a>
        <a href="#" class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <h1 id="dashTitle">Welcome back!</h1>
        <p>Manage your investments and collect your daily returns</p>
      </div>

      <div class="dash-stats">
        <div class="dash-stat-card">
          <div class="label">Wallet Balance</div>
          <div class="value primary" id="balanceVal">₦0</div>
        </div>
        <div class="dash-stat-card">
          <div class="label">Total Earned</div>
          <div class="value accent" id="totalEarnedVal">₦0</div>
        </div>
        <div class="dash-stat-card">
          <div class="label">Active Investments</div>
          <div class="value gold" id="activeInvestmentsVal">0</div>
        </div>
      </div>

      <div class="dash-tabs">
        <button class="dash-tab active" onclick="switchTab('tasks',this)"><i class="fas fa-list-check"></i> Daily Tasks</button>
        <button class="dash-tab" onclick="switchTab('investments',this)"><i class="fas fa-chart-line"></i> Investments</button>
        <button class="dash-tab" onclick="switchTab('new-invest',this)"><i class="fas fa-plus-circle"></i> New Investment</button>
        <button class="dash-tab" onclick="switchTab('withdraw',this)"><i class="fas fa-money-bill-wave"></i> Withdraw</button>
        <button class="dash-tab" onclick="switchTab('history',this)"><i class="fas fa-history"></i> History</button>
        <button class="dash-tab" onclick="switchTab('install',this)"><i class="fas fa-download"></i> Install App</button>
        <button class="dash-tab" onclick="switchTab('notifications',this)"><i class="fas fa-bell"></i> Alerts <span id="notifBadge" style="display:none;background:#ef4444;color:#fff;padding:2px 6px;border-radius:10px;font-size:0.7rem;margin-left:4px;"></span></button>
      </div>

      <div class="dash-panel active" id="panel-tasks">
        <div id="taskStatusMsg" class="task-status-msg inactive"><i class="fas fa-clock"></i> Checking task status...</div>
        <div id="tasksList"></div>
      </div>
      <div class="dash-panel" id="panel-investments"><div id="investmentsList"></div></div>
      <div class="dash-panel" id="panel-new-invest">
        <div id="vipPlanSelector">
          <h3 style="margin-bottom:20px;"><i class="fas fa-crown" style="color:var(--gold);margin-right:8px;"></i> Select a VIP Plan</h3>
          <div class="vip-select-grid" id="vipSelectGrid"></div>
        </div>
        <div id="paymentArea" style="display:none;"></div>
      </div>
      <div class="dash-panel" id="panel-withdraw">
        <div id="withdrawInfo" style="margin-bottom:20px;padding:16px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);"></div>
        <div id="withdrawForm"></div>
      </div>
      <div class="dash-panel" id="panel-history"><div id="historyList"></div></div>
      <div class="dash-panel" id="panel-install"><div id="installAppArea"></div></div>
      <div class="dash-panel" id="panel-notifications"><div id="notifList"></div></div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    const API = (url, opts = {}) => {
      const token = localStorage.getItem('token');
      const headers = { ...(opts.headers || {}), 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, { ...opts, headers }).then(async r => {
        if (r.status === 401) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/login.html'; return r; }
        return r;
      });
    };

    let userData = null, vipPlans = {}, investments = [];

    async function init() {
      try {
        const res = await API('/api/me');
        if (!res.ok) { window.location.href = '/login.html'; return; }
        const data = await res.json();
        userData = data.user;
        document.getElementById('userGreeting').textContent = 'Hi, ' + userData.username;
        document.getElementById('dashTitle').textContent = 'Welcome back, ' + userData.username + '!';
        if (userData.isAdmin) document.getElementById('adminLink').style.display = '';
        updateStats();
        loadVipPlans();
        loadInvestments();
        loadTaskStatus();
        loadWithdrawInfo();
        loadNotifications();
        setInterval(loadTaskStatus, 60000);
      } catch (err) { window.location.href = '/login.html'; }
    }

    function updateStats() {
      document.getElementById('balanceVal').textContent = '₦' + Number(userData.balance).toLocaleString();
      document.getElementById('totalEarnedVal').textContent = '₦' + Number(userData.totalEarned).toLocaleString();
      document.getElementById('activeInvestmentsVal').textContent = investments.filter(i => i.status === 'active').length;
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'investments') loadInvestments();
      if (tab === 'tasks') { loadTaskStatus(); loadInvestments(); }
      if (tab === 'history') loadHistory();
      if (tab === 'install') loadInstallApp();
      if (tab === 'notifications') loadNotifications();
    }

    async function loadVipPlans() {
      const res = await API('/api/vip-plans');
      const data = await res.json();
      vipPlans = data.plans;
      renderVipSelect();
    }

    function renderVipSelect() {
      const grid = document.getElementById('vipSelectGrid');
      let html = '';
      for (const [level, plan] of Object.entries(vipPlans)) {
        const totalEarned = plan.dailyReturn * 730;
        const roi = ((totalEarned / plan.amount) * 100).toFixed(0);
        html += `<div class="vip-select-card" onclick="selectVip(${level})" id="vipCard${level}">
          <div class="level">VIP ${level}</div>
          <div class="price">₦${plan.amount.toLocaleString()}</div>
          <div class="return-amt">₦${plan.dailyReturn.toLocaleString()}/day</div>
          <div class="vip-roi-badge">${roi}% ROI</div>
          <div style="font-size:0.65rem;color:var(--text-muted);margin-top:4px;">Withdraw: ${plan.withdrawalDay}s</div>
        </div>`;
      }
      grid.innerHTML = html;
    }

    function selectVip(level) {
      document.querySelectorAll('.vip-select-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('vipCard' + level).classList.add('selected');
      const plan = vipPlans[level];
      const totalEarned = plan.dailyReturn * 730;
      const roi = ((totalEarned / plan.amount) * 100).toFixed(0);
      const pa = document.getElementById('paymentArea');
      pa.style.display = 'block';
      pa.innerHTML = `<div class="vip-detail-card">
        <div class="vip-detail-header">
          <div class="vip-detail-crown"><i class="fas fa-crown"></i></div>
          <div>
            <h3 class="vip-detail-title">VIP ${level} Investment</h3>
            <p class="vip-detail-subtitle">2-Year Partnership Plan</p>
          </div>
        </div>

        <div class="vip-detail-amount">
          <div class="vip-detail-amount-label">Investment Amount</div>
          <div class="vip-detail-amount-value">₦${plan.amount.toLocaleString()}</div>
        </div>

        <div class="vip-features-grid">
          <div class="vip-feature-item">
            <i class="fas fa-coins" style="color:var(--accent);"></i>
            <div><div class="vip-feature-label">Daily Return</div><div class="vip-feature-value">₦${plan.dailyReturn.toLocaleString()}</div></div>
          </div>
          <div class="vip-feature-item">
            <i class="fas fa-calendar-check" style="color:var(--primary);"></i>
            <div><div class="vip-feature-label">Withdrawal Day</div><div class="vip-feature-value">${plan.withdrawalDay}s</div></div>
          </div>
          <div class="vip-feature-item">
            <i class="fas fa-clock" style="color:var(--gold);"></i>
            <div><div class="vip-feature-label">Duration</div><div class="vip-feature-value">2 Years (730 days)</div></div>
          </div>
          <div class="vip-feature-item">
            <i class="fas fa-chart-line" style="color:#22c55e;"></i>
            <div><div class="vip-feature-label">Total Earnings</div><div class="vip-feature-value">₦${totalEarned.toLocaleString()}</div></div>
          </div>
          <div class="vip-feature-item">
            <i class="fas fa-percentage" style="color:#a855f7;"></i>
            <div><div class="vip-feature-label">Return on Investment</div><div class="vip-feature-value">${roi}%</div></div>
          </div>
          <div class="vip-feature-item">
            <i class="fas fa-briefcase" style="color:#06b6d4;"></i>
            <div><div class="vip-feature-label">Monthly Return</div><div class="vip-feature-value">₦${(plan.dailyReturn * 30).toLocaleString()}</div></div>
          </div>
        </div>

        <div class="vip-detail-summary">
          <div class="vip-summary-row"><span>Investment</span><span>₦${plan.amount.toLocaleString()}</span></div>
          <div class="vip-summary-row"><span>Daily Return</span><span>₦${plan.dailyReturn.toLocaleString()}</span></div>
          <div class="vip-summary-row"><span>Monthly (30 days)</span><span>₦${(plan.dailyReturn * 30).toLocaleString()}</span></div>
          <div class="vip-summary-row"><span>Yearly (365 days)</span><span>₦${(plan.dailyReturn * 365).toLocaleString()}</span></div>
          <div class="vip-summary-row total"><span>Total (2 Years)</span><span>₦${totalEarned.toLocaleString()}</span></div>
          <div style="padding:10px;margin-top:8px;background:rgba(239,68,68,0.05);border-radius:var(--radius-sm);border:1px solid rgba(239,68,68,0.15);font-size:0.78rem;color:#ef4444;"><i class="fas fa-receipt"></i> 10% VAT applies on all withdrawals</div>
        </div>

        <div style="margin-top:24px;text-align:center;">
          <button class="btn btn-primary btn-lg" onclick="createInvestment(${level})" id="investBtn" style="width:100%;max-width:400px;">
            <i class="fas fa-money-bill-transfer"></i> Proceed to Payment
          </button>
          <button class="btn btn-outline" onclick="cancelVipSelection()" style="margin-top:10px;width:100%;max-width:400px;">
            <i class="fas fa-arrow-left"></i> Back to Plans
          </button>
        </div>
        <div id="generatedPayment" style="margin-top:20px;"></div>
      </div>`;
      pa.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function cancelVipSelection() {
      document.getElementById('paymentArea').style.display = 'none';
      document.querySelectorAll('.vip-select-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('vipPlanSelector').scrollIntoView({ behavior: 'smooth' });
    }

    let autoVerifyInterval = null;
    let autoVerifyAttempts = 0;
    const MAX_AUTO_VERIFY = 30;

    async function createInvestment(level) {
      const btn = document.getElementById('investBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating payment details...';
      try {
        const res = await API('/api/create-investment', { method: 'POST', body: JSON.stringify({ vipLevel: level }) });
        const data = await res.json();
        if (res.ok) {
          const pd = data.paymentDetails;
          document.getElementById('generatedPayment').innerHTML = `
            <div class="payment-generated-box">
              <div class="alert alert-success"><i class="fas fa-check-circle"></i> Transfer exactly the amount below to this account</div>
              <div class="payment-bank-card">
                <div class="payment-bank-name"><i class="fas fa-university"></i> ${pd.bankName}</div>
                <div class="payment-account-number" onclick="copyText('${pd.accountNumber}')" title="Tap to copy">${pd.accountNumber}<i class="fas fa-copy" style="margin-left:10px;font-size:0.8rem;opacity:0.6;"></i></div>
                <div class="payment-account-name">${pd.accountName}</div>
              </div>
              <div class="payment-amount-box">
                <div class="payment-amount-label">Amount to Pay</div>
                <div class="payment-amount-value">₦${pd.amount.toLocaleString()}</div>
              </div>
              <div class="payment-detail-row"><span class="label">Reference</span><span class="value" style="font-size:0.75rem;word-break:break-all;">${pd.reference}</span></div>
              <div class="payment-timer" id="paymentTimer">
                <i class="fas fa-hourglass-half"></i> Auto-checking payment status...
                <div class="payment-timer-bar"><div class="payment-timer-fill" id="timerFill"></div></div>
              </div>
              <div style="margin-top:16px;text-align:center;display:flex;flex-direction:column;gap:10px;">
                <button class="btn btn-accent btn-lg" onclick="verifyPayment('${pd.reference}')" id="verifyBtn" style="width:100%;">
                  <i class="fas fa-check-double"></i> I've Made Payment
                </button>
                <button class="btn btn-outline" onclick="cancelInvestment('${pd.reference}')" style="width:100%;">
                  <i class="fas fa-times"></i> Cancel
                </button>
              </div>
            </div>`;
          btn.style.display = 'none';
          startAutoVerify(pd.reference);
        } else {
          showToast(data.error, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-money-bill-transfer"></i> Proceed to Payment';
        }
      } catch (err) {
        showToast('Network error', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-money-bill-transfer"></i> Proceed to Payment';
      }
    }

    function startAutoVerify(reference) {
      autoVerifyAttempts = 0;
      if (autoVerifyInterval) clearInterval(autoVerifyInterval);
      autoVerifyInterval = setInterval(async () => {
        autoVerifyAttempts++;
        const fill = document.getElementById('timerFill');
        if (fill) fill.style.width = ((autoVerifyAttempts / MAX_AUTO_VERIFY) * 100) + '%';
        if (autoVerifyAttempts >= MAX_AUTO_VERIFY) {
          clearInterval(autoVerifyInterval);
          const timer = document.getElementById('paymentTimer');
          if (timer) timer.innerHTML = '<i class="fas fa-info-circle"></i> Auto-check stopped. Click "I\'ve Made Payment" when ready.';
          return;
        }
        try {
          const res = await API('/api/verify-payment', { method: 'POST', body: JSON.stringify({ reference }) });
          const data = await res.json();
          if (res.ok && data.message !== 'Transaction not found') {
            clearInterval(autoVerifyInterval);
            showToast('Payment verified! Investment activated.', 'success');
            loadInvestments();
            loadUserData();
            document.getElementById('paymentArea').style.display = 'none';
          }
        } catch (e) {}
      }, 10000);
    }

    async function verifyPayment(reference) {
      const btn = document.getElementById('verifyBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Verifying...'; }
      try {
        const res = await API('/api/verify-payment', { method: 'POST', body: JSON.stringify({ reference }) });
        const data = await res.json();
        if (res.ok) {
          if (autoVerifyInterval) clearInterval(autoVerifyInterval);
          showToast(data.message, 'success');
          loadInvestments();
          loadUserData();
          document.getElementById('paymentArea').style.display = 'none';
        } else {
          showToast(data.error || 'Payment not yet confirmed. Please wait a few minutes after transfer.', 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-double"></i> I\'ve Made Payment'; }
        }
      } catch (err) {
        showToast('Verification failed. Try again.', 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-double"></i> I\'ve Made Payment'; }
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied!', 'success')).catch(() => {});
    }

    async function cancelInvestment(reference) {
      if (autoVerifyInterval) clearInterval(autoVerifyInterval);
      document.getElementById('paymentArea').style.display = 'none';
      document.querySelectorAll('.vip-select-card').forEach(c => c.classList.remove('selected'));
    }

    async function loadUserData() {
      try { const res = await API('/api/me'); const data = await res.json(); userData = data.user; updateStats(); } catch (e) {}
    }

    async function loadInvestments() {
      const res = await API('/api/my-investments');
      const data = await res.json();
      investments = data.investments;
      updateStats();
      renderInvestments();
    }

    function renderInvestments() {
      const list = document.getElementById('investmentsList');
      if (investments.length === 0) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No Investments Yet</h3><p>Start by choosing a VIP plan</p><br><button class="btn btn-primary" onclick="document.querySelectorAll('.dash-tab')[2].click();"><i class="fas fa-plus-circle"></i> Make First Investment</button></div>`;
        return;
      }
      let html = '';
      investments.forEach(inv => {
        html += `<div class="investment-card">
          <div class="investment-header"><div class="investment-vip"><span class="vip-badge">VIP ${inv.vipLevel}</span><span class="status-badge active">${inv.status}</span></div><span style="font-size:0.8rem;color:var(--text-muted);">Since ${new Date(inv.createdAt).toLocaleDateString()}</span></div>
          <div class="investment-details">
            <div class="invest-detail"><div class="label">Invested</div><div class="val primary">₦${Number(inv.amount).toLocaleString()}</div></div>
            <div class="invest-detail"><div class="label">Daily Return</div><div class="val accent">₦${Number(inv.dailyReturn).toLocaleString()}</div></div>
            <div class="invest-detail"><div class="label">Collected</div><div class="val">₦${Number(inv.totalCollected).toLocaleString()}</div></div>
            <div class="invest-detail"><div class="label">Days</div><div class="val">${inv.daysCollected}</div></div>
          </div>
          <div class="claim-btn-container"><button class="btn btn-accent" onclick="claimTask(${inv.id})" id="claimBtn${inv.id}"><i class="fas fa-hand-pointer"></i> Collect (₦${Number(inv.dailyReturn).toLocaleString()})</button></div>
        </div>`;
      });
      list.innerHTML = html;
    }

    async function loadTaskStatus() {
      try {
        const res = await API('/api/task-status');
        const data = await res.json();
        const msg = document.getElementById('taskStatusMsg');
        msg.className = data.canClaim ? 'task-status-msg active' : 'task-status-msg inactive';
        msg.innerHTML = `<i class="fas fa-${data.canClaim ? 'check-circle' : 'clock'}"></i> ${data.message}`;
        document.querySelectorAll('[id^="claimBtn"]').forEach(btn => btn.disabled = !data.canClaim);
      } catch (err) {}
    }

    async function claimTask(investmentId) {
      const btn = document.getElementById('claimBtn' + investmentId);
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Processing...';
      try {
        const res = await API('/api/claim-task', { method: 'POST', body: JSON.stringify({ investmentId }) });
        const data = await res.json();
        if (res.ok) { showToast(data.message, 'success'); userData.balance = data.newBalance; updateStats(); loadInvestments(); }
        else { showToast(data.error, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-hand-pointer"></i> Collect'; }
      } catch (err) { showToast('Network error', 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-hand-pointer"></i> Collect'; }
    }

    async function loadWithdrawInfo() {
      const infoDiv = document.getElementById('withdrawInfo');
      const formDiv = document.getElementById('withdrawForm');
      const activeVips = investments.filter(i => i.status === 'active');
      const allowedDays = new Set();
      activeVips.forEach(inv => { if (vipPlans[inv.vipLevel]) allowedDays.add(vipPlans[inv.vipLevel].withdrawalDay); });

      if (activeVips.length === 0) { infoDiv.innerHTML = '<p style="color:var(--text-muted);text-align:center;"><i class="fas fa-info-circle"></i> You need an active investment to make withdrawals.</p>'; formDiv.innerHTML = ''; return; }

      const ng = new Date(new Date().toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const currentDay = dayNames[ng.getDay()];
      const canWithdraw = allowedDays.has(currentDay);

      infoDiv.innerHTML = `<p style="margin-bottom:8px;"><i class="fas fa-info-circle" style="color:var(--primary);"></i> <strong>Balance:</strong> <span style="color:var(--primary);font-weight:700;">₦${Number(userData.balance).toLocaleString()}</span></p>
        <p style="margin-bottom:8px;"><i class="fas fa-calendar" style="color:var(--accent);"></i> <strong>Withdrawal Days:</strong> ${[...allowedDays].join(', ')}s</p>
        <p><i class="fas fa-clock" style="color:${canWithdraw ? '#22c55e' : '#ef4444'};"></i> <strong>Today (${currentDay}):</strong> <span style="color:${canWithdraw ? '#22c55e' : '#ef4444'};">${canWithdraw ? 'Available!' : 'Not available today.'}</span></p>`;

      if (!canWithdraw) { formDiv.innerHTML = ''; return; }
      formDiv.innerHTML = `<div class="payment-details-box"><h3><i class="fas fa-money-bill-wave" style="color:var(--accent);margin-right:8px;"></i> Withdraw</h3>
        <div class="form-group"><label>Amount</label><input type="number" id="withdrawAmount" placeholder="Enter amount" min="100" max="${userData.balance}" oninput="updateWithdrawPreview()"></div>
        <div id="withdrawPreview" style="padding:12px;background:rgba(0,87,255,0.05);border-radius:var(--radius-sm);border:1px solid rgba(0,87,255,0.1);margin-bottom:16px;display:none;">
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;"><span style="color:var(--text-muted);">Withdrawal Amount</span><span id="previewAmount" style="font-weight:700;">₦0</span></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;border-top:1px solid var(--border);"><span style="color:var(--text-muted);">VAT (10%)</span><span id="previewVat" style="color:#ef4444;font-weight:700;">-₦0</span></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:1rem;border-top:2px solid var(--border);margin-top:4px;"><span style="font-weight:800;">You Will Receive</span><span id="previewCredit" style="color:#22c55e;font-weight:900;">₦0</span></div>
        </div>
        <div class="form-group"><label>Bank</label><input type="text" id="withdrawBank" placeholder="e.g. GTBank"></div>
        <div class="form-group"><label>Account Number</label><input type="text" id="withdrawAccount" placeholder="10-digit number" maxlength="10"></div>
        <div class="form-group"><label>Account Name</label><input type="text" id="withdrawAccountName" placeholder="Account holder name"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="submitWithdraw()" id="withdrawBtn"><i class="fas fa-paper-plane"></i> Submit</button></div>`;
    }

    function updateWithdrawPreview() {
      const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
      const preview = document.getElementById('withdrawPreview');
      if (amount <= 0) { preview.style.display = 'none'; return; }
      preview.style.display = 'block';
      const vat = Math.round(amount * 0.10);
      const credit = amount - vat;
      document.getElementById('previewAmount').textContent = '₦' + amount.toLocaleString();
      document.getElementById('previewVat').textContent = '-₦' + vat.toLocaleString();
      document.getElementById('previewCredit').textContent = '₦' + credit.toLocaleString();
    }

    async function submitWithdraw() {
      const amount = parseFloat(document.getElementById('withdrawAmount').value);
      const bankName = document.getElementById('withdrawBank').value.trim();
      const accountNumber = document.getElementById('withdrawAccount').value.trim();
      const accountName = document.getElementById('withdrawAccountName').value.trim();
      const btn = document.getElementById('withdrawBtn');
      if (!amount || amount < 100) return showToast('Enter valid amount', 'error');
      if (!bankName) return showToast('Enter bank name', 'error');
      if (!accountNumber || accountNumber.length !== 10) return showToast('Enter 10-digit account number', 'error');
      if (!accountName) return showToast('Enter account name', 'error');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Processing...';
      try {
        const res = await API('/api/withdraw', { method: 'POST', body: JSON.stringify({ amount, bankName, accountNumber, accountName }) });
        const data = await res.json();
        if (res.ok) { showToast(data.message, 'success'); userData.balance = data.newBalance; updateStats(); loadWithdrawInfo(); }
        else showToast(data.error, 'error');
      } catch (err) { showToast('Network error', 'error'); }
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit';
    }

    async function loadHistory() {
      try {
        const res = await API('/api/my-withdrawals');
        const data = await res.json();
        const list = document.getElementById('historyList');
        if (!data.withdrawals.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><h3>No History</h3></div>'; return; }
        let html = '<h3 style="margin-bottom:16px;">Withdrawal History</h3>';
        data.withdrawals.forEach(w => {
          const c = w.status === 'completed' ? '#22c55e' : w.status === 'pending' ? '#f59e0b' : '#ef4444';
          const vat = w.vatAmount || Math.round(Number(w.amount) * 0.10);
          const credit = w.creditAmount || (Number(w.amount) - vat);
          html += `<div class="withdrawal-card"><div class="withdrawal-header"><div class="withdrawal-amount" style="color:var(--primary);">₦${Number(w.amount).toLocaleString()}</div><span class="status-badge" style="background:${c}22;color:${c};border:1px solid ${c}33;">${w.status}</span></div><div style="margin-top:12px;font-size:0.85rem;color:var(--text-secondary);"><p><i class="fas fa-university"></i> ${w.bankName} - ${w.accountNumber}</p><p><i class="fas fa-user"></i> ${w.accountName}</p><p style="color:#ef4444;"><i class="fas fa-receipt"></i> VAT (10%): ₦${vat.toLocaleString()}</p><p style="color:#22c55e;font-weight:700;"><i class="fas fa-wallet"></i> You receive: ₦${credit.toLocaleString()}</p><p><i class="fas fa-clock"></i> ${new Date(w.createdAt).toLocaleString()}</p>${w.adminNote ? '<p style="color:var(--gold);"><i class="fas fa-comment"></i> ' + w.adminNote + '</p>' : ''}</div></div>`;
        });
        list.innerHTML = html;
      } catch (err) {}
    }

    async function loadNotifications() {
      try {
        const res = await API('/api/notifications');
        const data = await res.json();
        const list = document.getElementById('notifList');
        const unread = (data.notifications || []).filter(n => !n.is_read).length;
        const badge = document.getElementById('notifBadge');
        if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline'; } else { badge.style.display = 'none'; }

        if (!data.notifications || !data.notifications.length) { list.innerHTML = '<div class="empty-state"><i class="fas fa-bell"></i><h3>No Notifications</h3></div>'; return; }
        let html = '<h3 style="margin-bottom:16px;">Notifications</h3>';
        data.notifications.forEach(n => {
          html += `<div class="withdrawal-card" style="border-left:3px solid ${n.is_read ? 'var(--border)' : 'var(--primary)'};">
            <div style="font-weight:700;margin-bottom:4px;">${n.title}</div>
            <div style="font-size:0.85rem;color:var(--text-secondary);">${n.message}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">${new Date(n.created_at).toLocaleString()}</div>
          </div>`;
        });
        list.innerHTML = html;
        await API('/api/notifications/read', { method: 'POST' });
        setTimeout(() => { badge.style.display = 'none'; }, 2000);
      } catch (err) {}
    }

    function showToast(message, type) {
      const t = document.createElement('div');
      t.className = 'toast ' + type; t.textContent = message;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    async function loadInstallApp() {
      const area = document.getElementById('installAppArea');
      area.innerHTML = `<div class="vip-detail-card" style="text-align:center;">
        <div class="vip-detail-crown" style="margin:0 auto 16px;background:linear-gradient(135deg,#22c55e,#16a34a);"><i class="fas fa-download"></i></div>
        <h3 style="margin-bottom:8px;">Install Enrich U App</h3>
        <p style="color:var(--text-secondary);margin-bottom:24px;">Add to your home screen for quick access — it's free!</p>
        <div class="install-steps">
          <div class="install-step"><div class="install-step-num">1</div><div><strong>Android</strong><br><span style="color:var(--text-secondary);font-size:0.85rem;">Tap the browser menu (3 dots) > "Add to Home screen" or "Install App"</span></div></div>
          <div class="install-step"><div class="install-step-num">2</div><div><strong>iPhone/iPad</strong><br><span style="color:var(--text-secondary);font-size:0.85rem;">Tap the Share button > "Add to Home Screen"</span></div></div>
          <div class="install-step"><div class="install-step-num">3</div><div><strong>Computer</strong><br><span style="color:var(--text-secondary);font-size:0.85rem;">Click the install icon in the address bar or use browser menu</span></div></div>
        </div>
        <button class="btn btn-primary btn-lg" onclick="installApp()" style="margin-top:20px;width:100%;max-width:400px;"><i class="fas fa-download"></i> Install Now</button>
      </div>`;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    init();
  </script>

  <!-- Install App Banner -->
  <div id="installBanner" class="install-banner" style="display:none;">
    <div class="install-banner-content">
      <div class="install-banner-icon"><i class="fas fa-mobile-alt"></i></div>
      <div class="install-banner-text">
        <strong>Install Enrich U App</strong>
        <span>Add to your home screen for quick access</span>
      </div>
      <div class="install-banner-actions">
        <button class="btn btn-primary btn-sm" onclick="installApp()"><i class="fas fa-download"></i> Install</button>
        <button class="btn btn-outline btn-sm" onclick="dismissInstall()"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }

    // PWA Install Prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const dismissed = localStorage.getItem('installDismissed');
      if (!dismissed) document.getElementById('installBanner').style.display = 'block';
    });

    function installApp() {
      if (!deferredPrompt) { showToast('Use your browser menu to install', 'info'); return; }
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(r => {
        if (r.outcome === 'accepted') showToast('App installed!', 'success');
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
      });
    }

    function dismissInstall() {
      document.getElementById('installBanner').style.display = 'none';
      localStorage.setItem('installDismissed', '1');
    }

    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').style.display = 'none';
      showToast('Enrich U installed!', 'success');
    });
  </script>
</body>
</html>
