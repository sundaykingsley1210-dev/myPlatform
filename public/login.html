<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Login - Enrich U</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="logo">
        <i class="fas fa-gem"></i> Enrich <span>U</span>
      </a>
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to your Enrich U account</p>

      <div id="alertBox" class="alert" style="display:none;"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <p class="auth-link">
        Don't have an account? <a href="/register.html">Sign up here</a>
      </p>
    </div>
  </div>

  <script>
    async function checkExistingSession() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) {
          window.location.href = '/dashboard.html';
        }
      } catch (e) {}
    }

    function showAlert(message, type) {
      const box = document.getElementById('alertBox');
      box.className = 'alert alert-' + type;
      box.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i> ' + message;
      box.style.display = 'flex';
    }

    async function handleLogin(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');

      document.getElementById('alertBox').style.display = 'none';

      if (!username || !password) {
        showAlert('Please fill in all fields', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Logging in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          showAlert(data.message, 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 800);
        } else {
          showAlert(data.error, 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        }
      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    }

    checkExistingSession();
  </script>
</body>
</html>
